name: PSX Full Historical Backfill (One-Time)
on:
  workflow_dispatch: {}    # Manual trigger only — run this ONCE to seed the DB

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # allow up to 6 hours for large historical data

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up SSH tunnel to Oracle VM
        env:
          ORACLE_SSH_KEY: ${{ secrets.ORACLE_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$ORACLE_SSH_KEY" > ~/.ssh/oracle_key
          chmod 600 ~/.ssh/oracle_key
          ssh -i ~/.ssh/oracle_key \
              -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=30 \
              -fNL 15432:localhost:5432 \
              ubuntu@193.123.76.154
          sleep 3

      - name: Run Full GitHub Backfill (fetch all releases → clean → upload to Postgres)
        run: python scripts/github_full_backfill.py
        env:
          PG_DSN: "postgresql://${{ secrets.DB_USER }}:${{ secrets.DB_PASSWORD }}@localhost:15432/${{ secrets.DB_NAME }}"
          GITHUB_TOKEN: ${{ secrets.GH_DATA_TOKEN }}
          DB_BACKEND: postgresql
          LOCAL_HISTORICAL_DIR: ./data
          GITHUB_REPO: sadiqalvi/dps_intraday_scraper

      - name: Close SSH tunnel
        if: always()
        run: pkill -f "ssh.*15432" || true

      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: backfill-reports, path: reports/ }

      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: backfill-csv, path: csv_out/ }
